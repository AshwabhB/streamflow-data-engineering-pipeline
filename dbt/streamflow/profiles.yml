streamflow:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('BIGQUERY_DATASET', 'streamflow') }}"
      keyfile: "{{ env_var('GCP_CREDENTIALS_PATH') }}"
      location: US
      timeout_seconds: 300
      threads: 4
      priority: interactive
